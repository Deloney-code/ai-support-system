{% extends "base.html" %}

{% block title %}Log in{% endblock %}

{% block content %}
<h1>Log in</h1>

<form method="POST" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log in</button>
</form>

<p>Don't have an account? <a href="{% url 'accounts:register' %}">Register</a></p>
{% endblock %}
